name: Build APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova
        
      - name: Create Cordova Project
        run: |
          cordova create app
          cp -r www/* app/www/
          cp config.xml app/
          
      - name: Add Android Platform
        run: cd app && cordova platform add android@12.0.0
        
      - name: Build APK
        run: cd app && cordova build android --debug
        
      - name: Debug - List all files
        run: |
          echo "=== MENCARI FILE APK ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          echo "=== ISI FOLDER ==="
          ls -la app/platforms/android/app/build/outputs/apk/debug/ 2>/dev/null || echo "Folder not found"
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK-Debug
          path: |
            **/*.apk
            app/platforms/android/app/build/outputs/apk/debug/*.apk
            app/platforms/android/build/outputs/apk/debug/*.apk
