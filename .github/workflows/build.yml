name: Build Secure APK
on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install Cordova
        run: npm install -g cordova
        
      - name: Create Cordova Project
        run: |
          cordova create app com.secure.app "MySecureApp"
          cp -r www/* app/www/
          cp config.xml app/
          
      - name: Add Android Platform
        run: cd app && cordova platform add android@13.0.0
        
      - name: Build APK
        run: cd app && cordova build android --debug
        
      - name: List output files
        run: |
          echo "=== Mencari file APK ==="
          find app -name "*.apk" -type f
          ls -la app/platforms/android/app/build/outputs/apk/debug/ || true
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MySecureApp-SECURE-APK
          path: |
            app/platforms/android/app/build/outputs/apk/debug/*.apk
            app/platforms/android/build/outputs/apk/debug/*.apk
          if-no-files-found: error