name: Build Secure APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: npm install -g cordova
      - run: cordova create app com.secure.app "MySecureApp"
      - run: cd app && cordova platform add android@13.0.0
      - run: cd app && cordova build android
      - uses: actions/upload-artifact@v4
        with:
          name: MySecureApp-APK
          path: app/platforms/android/app/build/outputs/apk/debug/app-debug.apk